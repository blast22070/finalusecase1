apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: my-pod

  template:
    metadata:
      labels:
        app: my-pod

    spec:
      containers:
      - name: my-cont
        image: blast.azurecr.io/finalusecase:latest

        ports:
        - containerPort: 8080
